<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Prize Wheel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="spin-wheel-container">
        <h1 class="main-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
                <path d="M12 3v13"></path>
                <path d="M5 10l7 7 7-7"></path>
                <path d="M5 21h14"></path>
            </svg>
            Daily Prize Wheel
        </h1>

        <div class="content-wrapper">
            <!-- Left side - Wheel -->
            <div class="wheel-container">
                <canvas id="wheel" width="500" height="500"></canvas>
                <div class="wheel-center">
                    <span id="wheel-center-text">SPIN</span>
                </div>
                <div class="wheel-pointer"></div>
            </div>

            <!-- Right side - Controls and message -->
            <div class="controls-container">
                <div class="controls-panel">
                    <h2 id="controls-title">Try Your Luck!</h2>

                    <div id="countdown-container" class="hidden">
                        <div class="countdown-header">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="icon">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            <span>Come back later to spin again</span>
                        </div>

                        <div class="countdown-timer">
                            <div class="time-unit">
                                <div id="hours" class="time-value">00</div>
                                <div class="time-label">hours</div>
                            </div>
                            <div class="time-unit">
                                <div id="minutes" class="time-value">00</div>
                                <div class="time-label">minutes</div>
                            </div>
                            <div class="time-unit">
                                <div id="seconds" class="time-value">00</div>
                                <div class="time-label">seconds</div>
                            </div>
                        </div>
                    </div>

                    <button id="spin-button" class="spin-button" aria-label="Spin the wheel">
                        SPIN THE WHEEL
                    </button>
                </div>

                <div id="prize-message" class="prize-message hidden">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
