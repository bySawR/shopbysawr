<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Prize Wheel</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Iconify for Lucide icons -->
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'blue-primary': '#0079FF',
                        'blue-light': '#B2D7FF',
                        'blue-dark': '#0055B3',
                        'dark-text': '#1C172C',
                    },
                    boxShadow: {
                        'sm': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                        'DEFAULT': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'md': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom animations and transitions */
        @keyframes pulse-subtle {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .pulse-animation {
            animation: pulse-subtle 2s infinite;
        }

        .spin-transition {
            transition: transform 6s cubic-bezier(0.3, 0.1, 0.1, 1);
        }

        /* Improved pointer indicator */
        .pointer-container {
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            z-index: 20;
            display: flex;
            justify-content: center;
        }

        .triangle-pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #0079FF;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.2));
        }

        /* Highlight for the winning segment */
        .segment-highlight {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid #0079FF;
            border-radius: 50% 50% 0 0;
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
            z-index: 5;
            display: none;
        }

        .segment-highlight.active {
            display: block;
        }
    </style>
</head>

<body class="min-h-screen bg-white font-poppins text-dark-text">
    <div class="container mx-auto px-4 py-8 md:py-12 max-w-5xl">
        <!-- Header -->
        <header class="text-center mb-8 md:mb-12">
            <h1 class="text-2xl md:text-3xl font-semibold text-dark-text flex items-center justify-center gap-2">
                <iconify-icon icon="lucide:gift" width="24" height="24"></iconify-icon>
                Daily Prize Wheel
            </h1>
            <p class="text-gray-500 text-sm mt-2 max-w-md mx-auto">
                Spin the wheel for a chance to win amazing discounts. You can spin once every 24 hours.
            </p>
        </header>

        <div class="flex flex-col lg:flex-row items-center justify-center gap-8 lg:gap-16">
            <!-- Wheel Container -->
            <div class="relative">
                <div id="wheel-container"
                    class="relative w-[280px] h-[280px] md:w-[350px] md:h-[350px] lg:w-[400px] lg:h-[400px]">
                    <!-- Wheel Canvas -->
                    <canvas id="wheel" width="800" height="800" class="w-full h-full"></canvas>

                    <!-- Improved Pointer Indicator -->
                    <div class="pointer-container">
                        <div class="triangle-pointer"></div>
                    </div>

                    <!-- Segment highlight for winner -->
                    <div id="segment-highlight" class="segment-highlight"></div>

                    <!-- Spin Button - Fixed positioning to be centered -->
                    <div class="absolute top-0 left-0 w-full h-full flex items-center justify-center">
                        <button id="spin-button" aria-label="Spin the wheel"
                            class="w-24 h-24 md:w-28 md:h-28 bg-white text-blue-primary rounded-full flex items-center justify-center cursor-pointer select-none text-xl md:text-2xl font-semibold border border-blue-100 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-primary focus:ring-offset-2 transition-colors pulse-animation shadow-md z-10">
                            SPIN
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results and Countdown Container -->
            <div class="w-full max-w-md space-y-6">
                <!-- Status Container -->
                <div id="status-container" class="border border-blue-100 rounded-lg overflow-hidden shadow-sm">
                    <!-- Status Header -->
                    <div class="bg-blue-primary text-white p-3 flex items-center gap-2">
                        <iconify-icon id="status-icon" icon="lucide:zap" width="18" height="18"></iconify-icon>
                        <h2 id="status-title" class="text-base font-medium">Ready to Spin!</h2>
                    </div>

                    <!-- Countdown Timer -->
                    <div id="countdown-container" class="p-4 hidden">
                        <p class="text-gray-500 text-sm mb-3">Come back later to spin again:</p>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="bg-gray-50 rounded-md p-2 text-center">
                                <div id="hours" class="text-xl font-semibold text-blue-primary">00</div>
                                <div class="text-xs text-gray-400">hours</div>
                            </div>
                            <div class="bg-gray-50 rounded-md p-2 text-center">
                                <div id="minutes" class="text-xl font-semibold text-blue-primary">00</div>
                                <div class="text-xs text-gray-400">minutes</div>
                            </div>
                            <div class="bg-gray-50 rounded-md p-2 text-center">
                                <div id="seconds" class="text-xl font-semibold text-blue-primary">00</div>
                                <div class="text-xs text-gray-400">seconds</div>
                            </div>
                        </div>
                    </div>

                    <!-- Ready to Spin Message -->
                    <div id="ready-message" class="p-4">
                        <p class="text-gray-500 text-sm">Click the SPIN button to try your luck!</p>
                    </div>
                </div>

                <!-- Result Message -->
                <div id="result-container" class="hidden">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Define the sectors with the same values as the original
        const sectors = [
            { color: "#0079FF", text: "#FFFFFF", label: "25% Off", code: "HC36PIX4QW-25", message: "You've won! Your 25% discount code is HC36PIX4QW-25" },
            { color: "#B2D7FF", text: "#1C172C", label: "You lose", code: "", message: "Try again tomorrow!" },
            { color: "#0079FF", text: "#FFFFFF", label: "50% Off", code: "QDHHGTV066-50", message: "You've won! Your 50% discount code is QDHHGTV066-50" },
            { color: "#B2D7FF", text: "#1C172C", label: "You lose", code: "", message: "Better luck next time!" },
            { color: "#0079FF", text: "#FFFFFF", label: "75% Off", code: "H4R37FT2R6-75", message: "You've won! Your 75% discount code is H4R37FT2R6-75" },
            { color: "#B2D7FF", text: "#1C172C", label: "You lose", code: "", message: "No win, try again tomorrow!" }
        ];

        // DOM elements
        const wheel = document.getElementById('wheel');
        const spinButton = document.getElementById('spin-button');
        const statusTitle = document.getElementById('status-title');
        const statusIcon = document.getElementById('status-icon');
        const countdownContainer = document.getElementById('countdown-container');
        const readyMessage = document.getElementById('ready-message');
        const resultContainer = document.getElementById('result-container');
        const hoursElement = document.getElementById('hours');
        const minutesElement = document.getElementById('minutes');
        const secondsElement = document.getElementById('seconds');
        const segmentHighlight = document.getElementById('segment-highlight');

        // Canvas context
        const ctx = wheel.getContext('2d');
        const canvasWidth = wheel.width;
        const canvasHeight = wheel.height;
        const radius = canvasWidth / 2;
        const centerX = canvasWidth / 2;
        const centerY = canvasHeight / 2;
        const PI = Math.PI;
        const TAU = 2 * PI;
        const arc = TAU / sectors.length;

        // Variables
        let canSpin = false;
        let isSpinning = false;
        let rotation = 0;
        let countdownInterval = null;
        let timeLeft = 0;
        let lastSpinTime = localStorage.getItem("lastSpinTime")
            ? new Date(localStorage.getItem("lastSpinTime"))
            : null;
        let lastResult = localStorage.getItem("lastResult")
            ? JSON.parse(localStorage.getItem("lastResult"))
            : null;

        // Initialize the wheel
        function initWheel() {
            drawWheel();
            checkSpinStatus();
        }

        // Draw the wheel
        function drawWheel() {
            // Clear canvas
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            // Draw sectors
            sectors.forEach((sector, i) => {
                const startAngle = i * arc;
                const endAngle = (i + 1) * arc;

                // Draw sector
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = sector.color;
                ctx.fill();
                ctx.strokeStyle = "#FFFFFF";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + arc / 2);

                // Position text to be readable from outside
                ctx.textAlign = "center";
                ctx.fillStyle = sector.text;
                ctx.font = "bold 28px 'Poppins', sans-serif";

                // Draw text rotated to be horizontal
                ctx.translate(radius - 60, 0);
                ctx.rotate(Math.PI / 2);
                ctx.fillText(sector.label, 0, 0);

                ctx.restore();
            });

            // Draw center circle (white background for the SPIN button)
            ctx.beginPath();
            ctx.arc(centerX, centerY, 80, 0, TAU);
            ctx.fillStyle = "#FFFFFF";
            ctx.fill();
            ctx.strokeStyle = "#0079FF";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Check if user can spin
        function checkSpinStatus() {
            if (!lastSpinTime) {
                enableSpin();
                return;
            }

            const nextSpinTime = new Date(lastSpinTime.getTime() + 24 * 60 * 60 * 1000);
            const now = new Date();

            if (now < nextSpinTime) {
                disableSpin();
                timeLeft = nextSpinTime.getTime() - now.getTime();
                startCountdown();

                // Show last result if available
                if (lastResult) {
                    showResult(lastResult);
                }
            } else {
                enableSpin();
            }
        }

        // Enable spin
        function enableSpin() {
            canSpin = true;
            spinButton.disabled = false;
            spinButton.classList.add('pulse-animation');
            countdownContainer.classList.add('hidden');
            readyMessage.classList.remove('hidden');
            statusTitle.textContent = "Ready to Spin!";
            statusIcon.setAttribute('icon', 'lucide:zap');
            segmentHighlight.classList.remove('active');
        }

        // Disable spin
        function disableSpin() {
            canSpin = false;
            spinButton.disabled = true;
            spinButton.classList.remove('pulse-animation');
            countdownContainer.classList.remove('hidden');
            readyMessage.classList.add('hidden');
            statusTitle.textContent = "Next Spin Available In:";
            statusIcon.setAttribute('icon', 'lucide:clock');
        }

        // Start countdown
        function startCountdown() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            updateCountdown();

            countdownInterval = setInterval(() => {
                timeLeft -= 1000;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    enableSpin();
                    return;
                }

                updateCountdown();
            }, 1000);
        }

        // Update countdown display
        function updateCountdown() {
            const hours = Math.floor(timeLeft / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

            hoursElement.textContent = hours.toString().padStart(2, '0');
            minutesElement.textContent = minutes.toString().padStart(2, '0');
            secondsElement.textContent = seconds.toString().padStart(2, '0');
        }

        // Spin the wheel
        function spinWheel() {
            if (!canSpin || isSpinning) return;

            isSpinning = true;
            spinButton.textContent = "...";
            spinButton.classList.remove('pulse-animation');
            resultContainer.classList.add('hidden');
            segmentHighlight.classList.remove('active');

            // Randomly select a sector
            const selectedIndex = Math.floor(Math.random() * sectors.length);
            const selectedSector = sectors[selectedIndex];

            // Calculate a random number of full rotations (8-12)
            const fullRotations = Math.floor(Math.random() * 4) + 8; // More rotations for longer spin

            // Calculate the target rotation angle
            const sectorAngle = (TAU / sectors.length) * selectedIndex;
            const targetRotation = fullRotations * TAU + (TAU - sectorAngle) + (arc / 2);

            // Apply the spin-transition class for smooth animation
            wheel.classList.add('spin-transition');

            // Set the transform
            wheel.style.transform = `rotate(${targetRotation}rad)`;

            // Update status during spin
            statusTitle.textContent = "Spinning...";
            statusIcon.setAttribute('icon', 'lucide:loader');

            // Wait for animation to complete
            setTimeout(() => {
                // Animation complete
                isSpinning = false;
                spinButton.textContent = "SPIN";

                // Save spin time and result
                const now = new Date();
                localStorage.setItem("lastSpinTime", now.toString());
                localStorage.setItem("lastResult", JSON.stringify(selectedSector));

                // Show result
                showResult(selectedSector);

                // Highlight the winning segment
                segmentHighlight.classList.add('active');

                // Start countdown
                disableSpin();
                timeLeft = 24 * 60 * 60 * 1000;
                startCountdown();

                // Reset wheel for next spin
                setTimeout(() => {
                    wheel.classList.remove('spin-transition');
                    wheel.style.transform = `rotate(${targetRotation % TAU}rad)`;
                }, 100);
            }, 6000); // Match this with the CSS transition duration
        }

        // Show result
        function showResult(sector) {
            const isWin = sector.code !== "";

            let html = '';

            if (isWin) {
                html = `
          <div class="border border-blue-100 rounded-lg overflow-hidden shadow-sm">
            <div class="bg-blue-primary text-white p-3 flex items-center gap-2">
              <iconify-icon icon="lucide:award" width="18" height="18"></iconify-icon>
              <h2 class="text-base font-medium">Congratulations!</h2>
            </div>
            <div class="p-4">
              <div class="bg-blue-50 p-3 rounded-md mb-4 flex items-start gap-2">
                <iconify-icon icon="lucide:check-circle" class="text-blue-primary mt-0.5" width="18" height="18"></iconify-icon>
                <p class="text-gray-700 text-sm">${sector.message}</p>
              </div>
              <div class="flex w-full">
                <div class="bg-gray-50 border border-gray-200 rounded-l-md py-2 px-3 font-mono text-sm flex-grow">${sector.code}</div>
                <button onclick="copyToClipboard('${sector.code}')" class="bg-blue-primary text-white border border-blue-primary rounded-r-md px-3 hover:bg-blue-dark focus:outline-none focus:ring-2 focus:ring-blue-primary focus:ring-offset-2 transition-colors">
                  <iconify-icon icon="lucide:copy" width="16" height="16"></iconify-icon>
                </button>
              </div>
            </div>
          </div>
        `;
            } else {
                html = `
          <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm">
            <div class="bg-gray-100 p-3 flex items-center gap-2">
              <iconify-icon icon="lucide:info" width="18" height="18"></iconify-icon>
              <h2 class="text-base font-medium text-gray-700">No Win This Time</h2>
            </div>
            <div class="p-4">
              <div class="bg-gray-50 p-3 rounded-md flex items-start gap-2">
                <iconify-icon icon="lucide:alert-circle" class="text-gray-400 mt-0.5" width="18" height="18"></iconify-icon>
                <p class="text-gray-700 text-sm">${sector.message}</p>
              </div>
            </div>
          </div>
        `;
            }

            resultContainer.innerHTML = html;
            resultContainer.classList.remove('hidden');

            // Update status to show result
            statusTitle.textContent = isWin ? "You Won!" : "Better Luck Next Time";
            statusIcon.setAttribute('icon', isWin ? 'lucide:trophy' : 'lucide:alert-circle');
        }

        // Copy code to clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Show a temporary "Copied!" message
                const copyButton = document.querySelector("#result-container button");
                const originalHTML = copyButton.innerHTML;

                copyButton.innerHTML = `<iconify-icon icon="lucide:check" width="16" height="16"></iconify-icon>`;
                copyButton.classList.add("bg-green-600");

                setTimeout(() => {
                    copyButton.innerHTML = originalHTML;
                    copyButton.classList.remove("bg-green-600");
                }, 2000);
            });
        }

        // Event listeners
        spinButton.addEventListener('click', spinWheel);

        // Make copyToClipboard available globally
        window.copyToClipboard = copyToClipboard;

        // Initialize
        initWheel();
    </script>
</body>

</html>
